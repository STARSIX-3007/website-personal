<!DOCTYPE html>
<html>
<head>

<title>ALIKHA STORE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f6f6f6;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
background:#ff4fa3;
padding:15px 40px;
color:white;
}

.logo{
font-size:24px;
font-weight:bold;
}

.search{
width:300px;
padding:8px;
border-radius:20px;
border:none;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#ff9ac7,#ffd6ec);
color:white;
text-align:center;
padding:60px;
}

.hero h1{
font-size:40px;
}

/* PRODUCTS */

.container{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.product{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
border-radius:10px;
}

.price{
color:#ff4fa3;
font-weight:bold;
margin:10px 0;
}

.rating{
color:gold;
}

button{
background:#ff4fa3;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
overflow:auto;
}

.checkout{
background:#25D366;
width:100%;
margin-top:10px;
}

footer{
background:#ff4fa3;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<nav>

<div class="logo">🧸 ALIKHA STORE</div>

<input class="search" placeholder="Cari produk..." onkeyup="searchProduct(this.value)">

</nav>

<section class="hero">

<h1>Welcome to ALIKHA STORE</h1>
<p>Toko boneka lucu aesthetic</p>

</section>

<div class="container" id="products"></div>

<div class="cart">

<h2>Keranjang 🛒</h2>

<ul id="cartList"></ul>

<h3>Total: Rp <span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>

</div>

<footer>

ALIKHA STORE © 2026

</footer>

<script>

const products=[
{name:"Teddy Bear Pink",price:120000,category:"boneka",rating:"⭐⭐⭐⭐⭐",img:"https://i.imgur.com/7yUvePI.png"},
{name:"Tas Bear Cute",price:150000,category:"tas",rating:"⭐⭐⭐⭐",img:"https://i.imgur.com/7yUvePI.png"},
{name:"Bantal Bear",price:100000,category:"bantal",rating:"⭐⭐⭐⭐⭐",img:"https://i.imgur.com/7yUvePI.png"},
{name:"Boneka Mini",price:80000,category:"boneka",rating:"⭐⭐⭐⭐",img:"https://i.imgur.com/7yUvePI.png"}
]

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function renderProducts(list){

let html=""

list.forEach(p=>{

html+=`
<div class="product">

<img src="${p.img}">

<div class="rating">${p.rating}</div>

<h3>${p.name}</h3>

<div class="price">Rp${p.price}</div>

<button onclick="addCart('${p.name}',${p.price})">Tambah</button>

</div>
`

})

document.getElementById("products").innerHTML=html

}

function addCart(name,price){

cart.push({name,price})

updateCart()

}

function updateCart(){

let list=document.getElementById("cartList")
list.innerHTML=""

let total=0

cart.forEach(item=>{

let li=document.createElement("li")

li.innerText=item.name+" - Rp"+item.price

list.appendChild(li)

total+=item.price

})

document.getElementById("total").innerText=total

localStorage.setItem("cart",JSON.stringify(cart))

}

function checkout(){

let msg="Halo saya ingin membeli:%0A"

cart.forEach(p=>{
msg+="- "+p.name+"%0A"
})

window.open("https://wa.me/6281233125188?text="+msg)

}

function searchProduct(keyword){

let filtered=products.filter(p=>p.name.toLowerCase().includes(keyword.toLowerCase()))

renderProducts(filtered)

}

renderProducts(products)

updateCart()

</script>

</body>
</html>
